<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - SuperBike Mods Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/fontawesome.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Admin Dashboard Styles */
        body {
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        .admin-sidebar {
            width: 250px;
            background: #2A2A2A;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 20px 0;
            transition: all 0.3s ease;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
        }
        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            text-align: center;
        }
        .sidebar-header h2 {
            color: var(--primary-red);
            margin: 0;
            font-size: 24px;
        }
        .sidebar-header p {
            margin: 5px 0 0;
            font-size: 14px;
            opacity: 0.7;
        }
        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .nav-item {
            margin: 0;
        }
        .nav-link {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .nav-link.active {
            background: rgba(227, 30, 36, 0.2);
            border-left: 4px solid var(--primary-red);
        }
        .nav-link i {
            margin-right: 10px;
            font-size: 18px;
            width: 25px;
            text-align: center;
        }
        .admin-content {
            flex: 1;
            padding: 30px;
            background: var(--background-color);
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dashboard-title {
            margin: 0;
            color: white;
            font-size: 24px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            color: white;
        }
        .data-table th, .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .data-table th {
            background: rgba(0, 0, 0, 0.2);
            font-weight: 600;
        }
        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-active {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }
        .status-inactive {
            background: rgba(244, 67, 54, 0.2);
            color: #F44336;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.3s;
        }
        .view-btn {
            color: #03A9F4;
        }
        .edit-btn {
            color: #FFC107;
        }
        .delete-btn {
            color: #F44336;
        }
        .action-btn:hover {
            opacity: 0.8;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: #333;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s;
        }
        .modal.active .modal-content {
            transform: scale(1);
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            color: white;
            background: none;
            border: none;
            cursor: pointer;
        }
        .modal-header {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-title {
            margin: 0;
            color: white;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: white;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            color: white;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-red);
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: var(--primary-red);
            color: white;
        }
        .btn-secondary {
            background: #666;
            color: white;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .toggle-sidebar {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .user-details {
            margin-bottom: 30px;
        }
        .user-details p {
            margin: 10px 0;
            color: white;
        }
        .user-details strong {
            display: inline-block;
            width: 150px;
        }
        
        @media (max-width: 768px) {
            .admin-sidebar {
                width: 0;
                position: fixed;
                height: 100%;
                z-index: 999;
                overflow-x: hidden;
            }
            .admin-sidebar.active {
                width: 250px;
            }
            .toggle-sidebar {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <h2>SuperBike Mods</h2>
                <p>Admin Panel</p>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="dashboard.html" class="nav-link">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="dashboard.html#orders" class="nav-link">
                        <i class="fas fa-shopping-cart"></i> Orders
                    </a>
                </li>
                <li class="nav-item">
                    <a href="users.html" class="nav-link active">
                        <i class="fas fa-users"></i> Users
                    </a>
                </li>
            </ul>
            
            <button id="logoutBtn" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </aside>
        
        <!-- Main Content Area -->
        <main class="admin-content">
            <header class="dashboard-header">
                <button id="toggleSidebar" class="toggle-sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="dashboard-title">User Management</h1>
                <div class="admin-user">
                    <span>Admin</span>
                </div>
            </header>
            
            <div class="search-filter" style="margin-bottom: 20px;">
                <input type="text" id="userSearch" class="form-control" placeholder="Search users..." style="max-width: 300px;">
            </div>
            
            <table class="data-table">
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Registered Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <!-- Users will be loaded here dynamically -->
                </tbody>
            </table>
        </main>
    </div>
    
    <!-- View User Modal -->
    <div id="viewUserModal" class="modal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div class="modal-header">
                <h2 class="modal-title">User Details</h2>
            </div>
            <div id="userDetails" class="user-details">
                <!-- User details will be loaded here -->
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary close-modal">Close</button>
                <button type="button" class="btn btn-primary" id="editUserBtn">Edit User</button>
            </div>
        </div>
    </div>
    
    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal">
        <div class="modal-content">
            <button class="close-modal">&times;</button>
            <div class="modal-header">
                <h2 class="modal-title">Edit User</h2>
            </div>
            <form id="editUserForm">
                <div class="form-group">
                    <label for="userName">Full Name</label>
                    <input type="text" id="userName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="userEmail">Email</label>
                    <input type="email" id="userEmail" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="userPhone">Phone</label>
                    <input type="text" id="userPhone" class="form-control">
                </div>
                <div class="form-group">
                    <label for="userAddress">Address</label>
                    <input type="text" id="userAddress" class="form-control">
                </div>
                <div class="form-group">
                    <label for="userStatus">Status</label>
                    <select id="userStatus" class="form-control">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update User</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check admin authentication
            checkAdminAuth();
            
            // Load users data for this specific page
            loadUsersData();
            
            // Set up event listeners specific to this page
            setupUserPageEvents();
        });
        
        function setupUserPageEvents() {
            // Handle user search
            const searchInput = document.getElementById('userSearch');
            if (searchInput) {
                searchInput.addEventListener('input', function() {
                    const searchTerm = this.value.toLowerCase();
                    const rows = document.querySelectorAll('#usersTableBody tr');
                    
                    rows.forEach(row => {
                        const name = row.querySelector('td:nth-child(2)').textContent.toLowerCase();
                        const email = row.querySelector('td:nth-child(3)').textContent.toLowerCase();
                        
                        if (name.includes(searchTerm) || email.includes(searchTerm)) {
                            row.style.display = '';
                        } else {
                            row.style.display = 'none';
                        }
                    });
                });
            }
            
            // Event delegation for view user button
            document.addEventListener('click', function(e) {
                // View user button
                if (e.target.closest('.view-btn[data-user-id]')) {
                    const button = e.target.closest('.view-btn[data-user-id]');
                    const userId = button.getAttribute('data-user-id');
                    
                    // Find user data
                    const user = sampleUsers.find(u => u.id === userId);
                    if (user) {
                        showUserDetails(user);
                    }
                }
                
                // Edit user button in details modal
                else if (e.target.id === 'editUserBtn') {
                    const userId = e.target.getAttribute('data-user-id');
                    const user = sampleUsers.find(u => u.id === userId);
                    
                    if (user) {
                        closeModal(document.getElementById('viewUserModal'));
                        showEditUserForm(user);
                    }
                }
                
                // Edit user button in table
                else if (e.target.closest('.edit-btn[data-user-id]')) {
                    const button = e.target.closest('.edit-btn[data-user-id]');
                    const userId = button.getAttribute('data-user-id');
                    
                    // Find user data
                    const user = sampleUsers.find(u => u.id === userId);
                    if (user) {
                        showEditUserForm(user);
                    }
                }
                
                // Delete user button
                else if (e.target.closest('.delete-btn[data-user-id]')) {
                    const button = e.target.closest('.delete-btn[data-user-id]');
                    const userId = button.getAttribute('data-user-id');
                    
                    if (confirm(`Are you sure you want to delete user ${userId}?`)) {
                        // Remove from sample data
                        const userIndex = sampleUsers.findIndex(u => u.id === userId);
                        if (userIndex !== -1) {
                            sampleUsers.splice(userIndex, 1);
                            
                            // Update table
                            loadUsersData();
                            
                            alert('User deleted successfully');
                        }
                    }
                }
            });
            
            // Edit user form submission
            const editUserForm = document.getElementById('editUserForm');
            if (editUserForm) {
                editUserForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const userId = this.getAttribute('data-user-id');
                    const userIndex = sampleUsers.findIndex(u => u.id === userId);
                    
                    if (userIndex !== -1) {
                        // Update user data
                        sampleUsers[userIndex].name = document.getElementById('userName').value;
                        sampleUsers[userIndex].email = document.getElementById('userEmail').value;
                        sampleUsers[userIndex].phone = document.getElementById('userPhone').value;
                        sampleUsers[userIndex].address = document.getElementById('userAddress').value;
                        sampleUsers[userIndex].status = document.getElementById('userStatus').value;
                        
                        // Update table
                        loadUsersData();
                        
                        // Close modal
                        closeModal(document.getElementById('editUserModal'));
                        
                        alert('User updated successfully');
                    }
                });
            }
        }
        
        function showUserDetails(user) {
            const userDetails = document.getElementById('userDetails');
            
            userDetails.innerHTML = `
                <p><strong>User ID:</strong> ${user.id}</p>
                <p><strong>Name:</strong> ${user.name}</p>
                <p><strong>Email:</strong> ${user.email}</p>
                <p><strong>Registered Date:</strong> ${user.registeredDate}</p>
                <p><strong>Status:</strong> <span class="status-badge status-${user.status}">${capitalizeFirstLetter(user.status)}</span></p>
                <p><strong>Phone:</strong> ${user.phone || 'N/A'}</p>
                <p><strong>Address:</strong> ${user.address || 'N/A'}</p>
                <p><strong>Total Orders:</strong> ${user.orders}</p>
            `;
            
            // Set the user ID for the edit button
            document.getElementById('editUserBtn').setAttribute('data-user-id', user.id);
            
            // Open modal
            openModal(document.getElementById('viewUserModal'));
        }
        
        function showEditUserForm(user) {
            const editUserForm = document.getElementById('editUserForm');
            
            // Set form values
            document.getElementById('userName').value = user.name;
            document.getElementById('userEmail').value = user.email;
            document.getElementById('userPhone').value = user.phone || '';
            document.getElementById('userAddress').value = user.address || '';
            document.getElementById('userStatus').value = user.status;
            
            // Set user ID on form
            editUserForm.setAttribute('data-user-id', user.id);
            
            // Open modal
            openModal(document.getElementById('editUserModal'));
        }
    </script>
</body>
</html>
